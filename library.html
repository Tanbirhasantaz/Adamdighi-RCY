    <div class="container">
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">
            <i class="fas fa-book-open"></i> Online Library
          </h2>
          <p style="color: var(--text-muted); margin-top: 0.5rem">
            Download official documents, training materials, and guidelines
          </p>
        </div>

        <div class="card-grid" id="libraryContainer"></div>
      </section>
    </div>

    <footer>
      <div class="container">
        <p>© ২০২৫ আদমদীঘি যুব রেড ক্রিসেন্ট, বগুড়া</p>
        <p class="tagline">
          <i class="fas fa-globe"></i> রেড ক্রিসেন্ট যুব — স্বেচ্ছায় সেবায়
          নিবেদিত
        </p>
      </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
      const libraryItems = [
        {
          name: "Master Slide of First Aid",
          filename: "MASTER_SLIDE_FIRST_AID.pdf",
          icon: "fas fa-file-pdf",
          description:
            "Comprehensive first aid training master slide — essential guidelines, procedures, and emergency response protocols for volunteers.",
          size: "2.4 MB",
        },
        {
          name: "BDRCS Brand Guideline",
          filename: "BDRCS_BRAND_GUIDELINE.pdf",
          icon: "fas fa-file-alt",
          description:
            "Official Bangladesh Red Crescent Society branding manual. Logo usage, color codes, and communication standards.",
          size: "1.8 MB",
        },
      ];

      function downloadFile(filename, displayName) {
        const pdfUrl = `./documents/${filename}`;
        const link = document.createElement("a");
        link.href = pdfUrl;
        link.download = filename;
        link.target = "_blank";

        // Demo fallback
        fetch(pdfUrl, { method: "HEAD" })
          .then((response) => {
            if (response.ok) {
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              showToast(`📥 Downloading: ${displayName}`);
            } else {
              throw new Error("File not found");
            }
          })
          .catch(() => {
            showToast(`📄 Demo: ${displayName} would download here`);
          });
      }

      const container = document.getElementById("libraryContainer");
      container.innerHTML = libraryItems
        .map(
          (item) => `
            <article class="card">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <div class="card-icon" style="margin-bottom: 0;">
                        <i class="${item.icon}"></i>
                    </div>
                    <div>
                        <h3 style="margin-bottom: 4px;">${item.name}</h3>
                        <small style="color: var(--text-muted);">PDF • ${item.size}</small>
                    </div>
                </div>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6;">
                    ${item.description}
                </p>
                <button class="btn btn-primary" onclick="downloadFile('${item.filename}', '${item.name}')">
                    <i class="fas fa-download"></i> Download PDF
                </button>
            </article>
        `,
        )
        .join("");
    </script>
  </body>

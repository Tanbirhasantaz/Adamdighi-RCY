<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | RCY Adamdighi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #b71c1c;
            --primary-light: #d32f2f;
            --bg: #fefaf5;
            --white: #ffffff;
            --text: #1e2a2f;
            --text-light: #5a6b6b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-top: 80px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--white);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            z-index: 1000;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 800;
            font-size: 1.3rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .form-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .success-msg {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .info-box {
            background: #ffebee;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border-left: 4px solid var(--primary);
        }

        .info-box p {
            color: var(--text);
            font-size: 0.95rem;
        }

        footer {
            background: var(--text);
            color: var(--white);
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-hand-holding-heart"></i>
            <span>RCY Adamdighi</span>
        </a>
    </nav>

    <div class="container">
        <div class="form-card">
            
            <h1><i class="fas fa-envelope"></i> Contact Us</h1>
            <p class="subtitle">Send us a message and we'll respond within 24 hours.</p>

            <div class="info-box">
                <p><i class="fas fa-info-circle"></i> <strong>Email:</strong> rcyadamdighi@gmail.com</p>
            </div>

            <!-- NETLIFY FORM - CRITICAL: Must have these exact attributes -->
            <form 
                name="contact" 
                method="POST" 
                netlify
                netlify-honeypot="bot-field"
                action="/thank-you.html"
            >
                
                <!-- Honeypot (anti-spam) - HIDDEN from users -->
                <div style="display: none;">
                    <label>Don't fill this out: <input name="bot-field" /></label>
                </div>

                <!-- Hidden form name for Netlify -->
                <input type="hidden" name="form-name" value="contact">

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Your Name</label>
                    <input 
                        type="text" 
                        name="name" 
                        placeholder="Your full name" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Your Email</label>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="your@email.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone (Optional)</label>
                    <input 
                        type="tel" 
                        name="phone" 
                        placeholder="+880 1XXX-XXXXXX"
                    >
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Subject</label>
                    <select name="subject" required>
                        <option value="">Select subject...</option>
                        <option value="join">I want to join RCY</option>
                        <option value="donate">Donation</option>
                        <option value="training">Training Info</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-comment"></i> Message</label>
                    <textarea 
                        name="message" 
                        placeholder="Write your message here..." 
                        required
                    ></textarea>
                </div>

                <button type="submit">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>

            </form>

        </div>
    </div>

    <footer>
        <p>© ২০২৫ আদমদীঘি যুব রেড ক্রিসেন্ট, বগুড়া</p>
        <p style="color: #ffcd7e; margin-top: 0.5rem;">
            <i class="fas fa-globe"></i> রেড ক্রিসেন্ট যুব — স্বেচ্ছায় সেবায় নিবেদিত
        </p>
    </footer>

</body>
</html>

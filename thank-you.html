<!DOCTYPE html>
<html lang="bn">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

            margin: 0 auto 1.5rem;
        }
        .icon i {

            color: #28a745;
        }
        h1 {
            color: #1e2a2f;
            margin-bottom: 1rem;
        }
        p {

            margin-bottom: 2rem;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.8rem 1.5rem;
            background: #b71c1c;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">
